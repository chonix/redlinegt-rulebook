backend:
  name: git-gateway
  branch: main

media_folder: "content/rules/es/media"
public_folder: "/content/rules/es/media"

collections:
  - name: "rules_es"
    label: "Reglamento (ES)"
    folder: "content/rules/es"
    create: true
    slug: "{{slug}}"

    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Orden", name: "order", widget: "number" }
      - { label: "Contenido", name: "body", widget: "markdown" }